name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform Checks
    runs-on: ubuntu-latest
    if: vars.TERRAFORM_CI_ENABLED != 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4.1.1

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint

      - name: Trivy Config Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          exit-code: "1"
          severity: HIGH,CRITICAL
          trivy-config: trivy.yaml

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz \
            https://github.com/terraform-docs/terraform-docs/releases/download/v0.20.0/terraform-docs-v0.20.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: terraform-docs check
        run: |
          terraform-docs .
          git diff --exit-code README.md
